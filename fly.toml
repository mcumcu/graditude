# fly.toml app configuration file for production Rails deployment
# See 'fly help' for more information about how to use this file.

app = "graditude"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  RAILS_ENV = "production"
  RAILS_LOG_TO_STDOUT = "true"
  RAILS_SERVE_STATIC_FILES = "true"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [services.concurrency]
    hard_limit = 20
    soft_limit = 10

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = 30000
    timeout = 30000
    grace_period = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[console]
  command = "/rails/bin/rails console"
