app = "graditude"
console_command = "/rails/bin/rails console"
primary_region = "iad"

[http_service]
  auto_stop_machines = "stop"
  auto_start_machines = true
  force_https = true
  internal_port = 8080
  min_machines_running = 0
  processes = [ "app" ]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
  memory_mb = 1_024